name: Heart Disease MLOps Pipeline

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  # Job 1: Run the full Pytest Suite
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # If pytest/scikit-learn are missing from requirements.txt, ensure they exist
        pip install pytest mlflow scikit-learn pandas numpy pyyaml

    - name: Run Pytest Suite
      run: |
        python -m pytest tests/ -v

  # Job 2: Run Training (Only runs if Testing Passes)
  train:
    runs-on: ubuntu-latest
    needs: test  # Establishes the strict dependency rule
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install mlflow scikit-learn pandas numpy pyyaml

    - name: Execute Model Training
      run: |
        python src/train.py

    - name: Programmatic Performance Gate Verification
      run: |
        # Evaluates the logged metrics using our comparison script
        # If the top run's accuracy drops below 80% (0.80), exit with non-zero code to fail the build
        python -c "
        import mlflow
        exp = mlflow.get_experiment_by_name('Heart_Disease_Classification')
        runs = mlflow.search_runs(experiment_ids=[exp.experiment_id], order_by=['metrics.accuracy DESC'])
        best_acc = runs.iloc[0]['metrics.accuracy']
        print(f'Top pipeline accuracy verified: {best_acc}')
        if best_acc < 0.80:
            print('CRITICAL: Best model performance does not meet threshold!')
            exit(1)
        print('SUCCESS: Performance gateway checks cleared.')
        "